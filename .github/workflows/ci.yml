name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  check:
    name: cargo check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --workspace --all-targets

  fmt:
    name: cargo fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: cargo clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: cargo test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run tests with serialized output
        shell: bash
        run: |
          set -euo pipefail
          if [ "$RUNNER_OS" = "Linux" ]; then
            timeout 300 cargo test --workspace --all-targets -- --test-threads=1 --nocapture
          else
            cargo test --workspace --all-targets -- --test-threads=1 --nocapture
          fi

  windows-watch:
    name: windows watcher rollback smoke
    runs-on: windows-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run focused Windows watcher coverage
        run: cargo test --test integration foreground_daemon_records_log_and_oops_round_trip -- --nocapture

  www:
    name: build www/ (Astro)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v5
        with:
          version: 9
      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: www/pnpm-lock.yaml
      - name: Install dependencies
        working-directory: www
        run: pnpm install --frozen-lockfile
      - name: Build site
        working-directory: www
        run: pnpm build
      - name: Report dist size
        working-directory: www
        run: |
          echo "### www/dist size" >> "$GITHUB_STEP_SUMMARY"
          du -sh dist >> "$GITHUB_STEP_SUMMARY" || true
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### JS files in dist (should be 0)" >> "$GITHUB_STEP_SUMMARY"
          find dist -name '*.js' | wc -l >> "$GITHUB_STEP_SUMMARY"

  build-release:
    name: release build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: aarch64-apple-darwin
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --release --target ${{ matrix.target }}
      - name: Report binary size
        run: |
          ls -lh target/${{ matrix.target }}/release/au
          file target/${{ matrix.target }}/release/au
